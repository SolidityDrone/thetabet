[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "paris"
fs_permissions = [
  { access = "read", path = "./" },
  { access = "read", path = "../ponder/deployments" },
  { access = "write", path = "../ponder/deployments" },
]

[rpc_endpoints]
polygon = "${POLYGON_RPC_URL}"

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
