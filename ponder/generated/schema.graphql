type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type ViewPageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type Meta {
  status: JSON
}

type Query {
  vault(id: BigInt!): vault
  vaults(where: vaultFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): vaultPage!
  investorPosition(id: String!): investorPosition
  investorPositions(where: investorPositionFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): investorPositionPage!
  vaultBet(id: BigInt!): vaultBet
  vaultBets(where: vaultBetFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): vaultBetPage!
  tipsterName(address: String!): tipsterName
  tipsterNames(where: tipsterNameFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): tipsterNamePage!
  depositEvent(id: String!): depositEvent
  depositEvents(where: depositEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): depositEventPage!
  withdrawEvent(id: String!): withdrawEvent
  withdrawEvents(where: withdrawEventFilter, orderBy: String, orderDirection: String, before: String, after: String, limit: Int, offset: Int): withdrawEventPage!
  _meta: Meta
}

